<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa Bulunamadı — Vitrin Studio</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23fbf9f5'/%3E%3Crect x='5' y='5' width='90' height='90' fill='none' stroke='%23e5620e' stroke-width='4'/%3E%3Ctext x='50' y='71' font-size='58' text-anchor='middle' fill='%231c1c1c' font-family='Georgia,serif'%3EV%3C/text%3E%3C/svg%3E">
<style>
  :root{--paper:#fbf9f5;--ink:#1c1c1c;--soft:#3a3730;--muted:#6d675c;--orange:#e5620e;--orange-text:#b0470a;--line:#e5dfd4;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:32px;line-height:1.6;}
  .kutu{max-width:480px;}
  .no{font-family:Georgia,"Times New Roman",serif;font-size:clamp(4rem,15vw,7rem);color:var(--orange-text);line-height:1;margin-bottom:18px;}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:500;font-size:1.6rem;margin-bottom:12px;}
  p{color:var(--muted);margin-bottom:30px;}
  a.btn{display:inline-block;background:var(--orange-text);color:#fff;text-decoration:none;
    padding:13px 28px;border-radius:2px;font-size:.95rem;font-weight:500;transition:background .2s;}
  a.btn:hover{background:#943a06;}
  a.btn:focus-visible{outline:2px solid var(--orange);outline-offset:3px;}
</style>
</head>
<body>
<div class="kutu">
  <div class="no">404</div>
  <h1>Aradığınız sayfa bulunamadı</h1>
  <p>Bu vitrin boş kalmış — ama asıl vitrinimiz bir tık ötede.</p>
  <a class="btn" href="/vitrinstudio/">Ana sayfaya dön</a>
</div>
</body>
</html>
